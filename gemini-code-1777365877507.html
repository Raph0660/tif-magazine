<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tif et ses Gourmandises</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-stone-900 font-serif">
    <div id="app" class="max-w-4xl mx-auto py-20 px-6">
        <h1 class="text-6xl text-center mb-16 border-b pb-10 border-stone-300">Tif et ses Gourmandises</h1>
        <div id="articles" class="grid gap-12">
            </div>
    </div>

    <script>
        // L'ADRESSE DE TON STOCK (GOOGLE SHEET)
        const SHEET_ID = 'TON_ID_DE_SHEET';
        const url = `https://docs.google.com/spreadsheets/d/1AY7skQKYPST-CczQFQTtu99HUuIjxFHypETfiqDIs1Q/gviz/tq?tqx=out:json`;

        fetch(url)
            .then(res => res.text())
            .then(data => {
                const json = JSON.parse(data.substr(47).slice(0, -2));
                const rows = json.table.rows;
                let html = '';
                rows.forEach(row => {
                    html += `
                        <article class="bg-white p-10 shadow-sm border border-stone-200">
                            <h2 class="text-3xl mb-4 font-bold">${row.c[0].v}</h2>
                            <div class="prose text-lg leading-relaxed text-stone-700">
                                ${row.c[1] ? row.c[1].v : ''}
                            </div>
                        </article>
                    `;
                });
                document.getElementById('articles').innerHTML = html;
            });
    </script>
</body>
</html>
